# ---
# relationships:
#   implements: package-repository-publishing
# ---

name: Submit package release
description: Commit one canonical package release manifest to repo.wyrd.foo

inputs:
  manifest:
    description: Path to the release manifest in the caller workspace
    required: true
  app-client-id:
    description: Client ID of the repo.wyrd.foo publisher GitHub App
    required: true
  app-private-key:
    description: Private key of the repo.wyrd.foo publisher GitHub App
    required: true

runs:
  using: composite
  steps:
    - name: Create repository-scoped installation token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      with:
        client-id: ${{ inputs.app-client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: wyrd-company
        repositories: repo.wyrd.foo
        permission-contents: write

    - name: Check out package repository
      uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      with:
        repository: wyrd-company/repo.wyrd.foo
        ref: release-manifests
        token: ${{ steps.token.outputs.token }}
        path: .repo-wyrd-foo
        persist-credentials: false

    - name: Validate and stage release manifest
      id: submit
      shell: bash
      env:
        MANIFEST: ${{ inputs.manifest }}
      run: "$GITHUB_ACTION_PATH/../../../scripts/submit-action.sh"

    - name: Commit release manifest
      if: steps.submit.outputs.state == 'created'
      shell: bash
      env:
        APP_SLUG: ${{ steps.token.outputs.app-slug }}
        APP_TOKEN: ${{ steps.token.outputs.token }}
        RESULT: ${{ steps.submit.outputs.path }}
      working-directory: .repo-wyrd-foo
      run: "$GITHUB_ACTION_PATH/../../../scripts/commit-release.sh"

    - name: Resolve immutable inbox commit
      id: inbox
      shell: bash
      env:
        RESULT: ${{ steps.submit.outputs.path }}
      working-directory: .repo-wyrd-foo
      run: "$GITHUB_ACTION_PATH/../../../scripts/resolve-inbox.sh"

    - name: Request package publication
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        INBOX_COMMIT: ${{ steps.inbox.outputs.commit }}
        MANIFEST_PATH: ${{ steps.submit.outputs.path }}
      run: "$GITHUB_ACTION_PATH/../../../scripts/dispatch-release.sh"
